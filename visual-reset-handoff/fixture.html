<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sticker Swap Visual Reset Handoff Fixture</title>
  <style>
    :root{
      --pitch:#07110f;
      --pitch-2:#10231f;
      --line:#2f6f5c;
      --cream:#f7efd9;
      --warm:#eadfbd;
      --gold:#f6d779;
      --bright:#fff2b8;
      --teal:#35d0be;
      --coral:#ff7a5f;
      --muted:#9bb8aa;
      --card:#132822;
      --border:rgba(247,239,217,.14);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#07110f;color:var(--cream)}
    body{display:grid;place-items:center;padding:24px;background:
      radial-gradient(circle at 16% 8%,rgba(53,208,190,.18),transparent 32%),
      radial-gradient(circle at 88% 4%,rgba(246,215,121,.16),transparent 28%),
      linear-gradient(180deg,#07110f,#0b1916)}
    .stage{width:min(100%,var(--w,390px));min-height:var(--h,844px);background:
      linear-gradient(180deg,rgba(7,17,15,.52),rgba(7,17,15,.92)),
      repeating-linear-gradient(90deg,rgba(247,239,217,.04) 0 1px,transparent 1px 42px),
      radial-gradient(circle at 50% -8%,rgba(246,215,121,.18),transparent 28%),
      var(--pitch);border:1px solid var(--border);border-radius:24px;box-shadow:0 24px 70px rgba(0,0,0,.42);overflow:hidden;position:relative}
    .stage.desktop{--w:1180px;--h:760px;border-radius:18px}
    .top{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--border);background:rgba(7,17,15,.72);backdrop-filter:blur(12px)}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:.12em;color:var(--gold)}
    .brand img{width:30px;height:30px}
    .pill{border:1px solid var(--border);border-radius:999px;padding:8px 12px;color:var(--muted);font-size:12px;background:rgba(247,239,217,.05)}
    .content{padding:18px}
    .hero{min-height:180px;border:1px solid rgba(246,215,121,.24);border-radius:16px;padding:18px;display:flex;flex-direction:column;justify-content:flex-end;background:
      linear-gradient(135deg,rgba(7,17,15,.18),rgba(19,40,34,.86)),
      radial-gradient(circle at 85% 20%,rgba(246,215,121,.22),transparent 24%),
      linear-gradient(115deg,rgba(53,208,190,.16),transparent 48%);position:relative;overflow:hidden}
    .desktop .hero{min-height:360px;padding:42px}
    .hero:after,.foil:after{content:"";position:absolute;inset:0;background:linear-gradient(112deg,transparent 20%,rgba(255,242,184,.18) 42%,rgba(53,208,190,.16) 48%,transparent 62%);pointer-events:none}
    .kicker{font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:var(--gold);font-weight:900}
    h1,h2,p{margin:0}
    h1{font-size:42px;line-height:.95;letter-spacing:-.02em}
    .desktop h1{font-size:78px}
    p{color:var(--muted);line-height:1.5}
    .hero p{max-width:540px;margin-top:10px;color:#d7e8df}
    .actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:18px}
    .desktop .actions{display:flex}
    button,.btn{border:0;border-radius:12px;padding:13px 16px;background:var(--teal);color:#06110f;font-weight:900;text-align:center}
    .btn.secondary{background:rgba(246,215,121,.14);color:var(--gold);border:1px solid rgba(246,215,121,.3)}
    .card{border:1px solid var(--border);border-radius:14px;background:rgba(19,40,34,.88);padding:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
    .grid{display:grid;gap:12px}
    .desktop .grid.cols{grid-template-columns:1.1fr .9fr}
    .field{border:1px solid var(--border);border-radius:12px;background:#0d211c;color:var(--cream);padding:14px;text-align:center;letter-spacing:.22em;font-weight:900}
    .motif{width:90px;height:90px;object-fit:contain;filter:drop-shadow(0 12px 20px rgba(0,0,0,.36))}
    .icon-preview{display:grid;place-items:center;gap:18px;min-height:100%;padding:44px}
    .icon-preview img{width:240px;height:240px;border-radius:48px;box-shadow:0 24px 70px rgba(0,0,0,.5)}
    .loader{display:grid;place-items:center;gap:16px;min-height:100%;text-align:center}
    .spinner{width:42px;height:42px;border-radius:50%;border:4px solid rgba(247,239,217,.18);border-top-color:var(--gold)}
    .avatar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px}
    .avatar{min-height:128px;text-align:center}
    .avatar .paper{width:64px;height:82px;border-radius:10px;background:var(--cream);border:5px solid var(--gold);margin:0 auto 10px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    .stat{padding:10px;border:1px solid var(--border);border-radius:10px;text-align:center;background:rgba(247,239,217,.04)}
    .stat b{display:block;font-size:22px;color:var(--gold)}
    .bar{height:9px;border-radius:999px;background:#19342e;overflow:hidden;margin-top:12px}
    .bar i{display:block;height:100%;width:36%;background:linear-gradient(90deg,var(--teal),var(--gold))}
    .section{display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid var(--border);border-radius:12px;background:rgba(19,40,34,.86);margin-top:10px}
    .mark{width:22px;height:30px;border-radius:5px;background:linear-gradient(145deg,var(--cream),var(--warm));border:2px solid var(--gold);margin-right:10px}
    .row{display:flex;align-items:center;gap:10px}
    .empty{display:grid;place-items:center;text-align:center;gap:12px;padding:44px 20px;border:1px dashed rgba(247,239,217,.22);border-radius:16px;background:linear-gradient(135deg,rgba(7,17,15,.72),rgba(19,40,34,.82))}
    .swap-card{display:flex;justify-content:space-between;gap:12px;border:1px solid var(--border);border-radius:14px;background:rgba(19,40,34,.9);padding:14px;margin-top:12px}
    .tag{display:inline-block;border-radius:999px;background:rgba(53,208,190,.13);color:var(--teal);padding:4px 9px;font-size:12px;font-weight:800;margin-top:6px}
    .modal-wrap{position:absolute;inset:0;display:grid;place-items:center;background:rgba(7,17,15,.68)}
    .modal{width:min(340px,calc(100% - 34px));min-height:320px;border:1px solid var(--gold);border-radius:20px;padding:24px;text-align:center;background:linear-gradient(160deg,rgba(19,40,34,.78),rgba(7,17,15,.94));box-shadow:0 28px 70px rgba(0,0,0,.58)}
    .modal .motif{margin:22px auto}
    .og{--w:1200px;--h:630px;border-radius:0}
    .og .content{height:100%;display:grid;align-content:end;padding:70px;background:
      linear-gradient(90deg,rgba(7,17,15,.95),rgba(7,17,15,.58)),
      radial-gradient(circle at 80% 18%,rgba(246,215,121,.18),transparent 28%)}
    .placeholder{position:absolute;top:10px;right:10px;border:1px solid rgba(255,122,95,.45);color:var(--coral);border-radius:999px;padding:6px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;background:rgba(7,17,15,.76);z-index:4}
  </style>
</head>
<body>
  <main id="stage" class="stage"></main>
  <script>
    const surfaces={
      "app-icon":{mode:"icon",title:"App icon / manifest icon preview"},
      "splash-loading":{mode:"loader",title:"STICKER SWAP",sub:"Group sticker tracker"},
      "landing-mobile":{mode:"landing",title:"Sticker swaps around the table",sub:"Create a group, track the book, and find the friend with the spare you need."},
      "landing-desktop":{mode:"landing",desktop:true,title:"Sticker swaps around the table",sub:"Create a group, track the book, and find the friend with the spare you need."},
      "invite-page":{mode:"invite",title:"Join Sam's Sticker Swap group",sub:"Enter the invite code and start tracking with friends."},
      "create-group":{mode:"create",title:"Start your sticker group",sub:"Your friends already have the stickers you need."},
      "join-group":{mode:"join",title:"Join a sticker group",sub:"Paste the invite code your friend shared."},
      "profile-setup":{mode:"profile",title:"Your profile",sub:"Choose the name friends will see in this group."},
      "collection-tab":{mode:"collection",title:"Finish the book",sub:"Track your album, mark spares, and let the group do the rest."},
      "no-stickers-empty-state":{mode:"empty",title:"No stickers tracked yet",sub:"Tap a sticker once for your book, then again for each spare.",motif:"album-slot.svg"},
      "no-spares-empty-state":{mode:"empty",title:"No spares yet",sub:"Tap a sticker again to add a spare for the swap table.",motif:"pack.svg"},
      "no-swaps-empty-state":{mode:"empty",title:"No matches yet",sub:"Invite friends or add more stickers to wake up the swap finder.",motif:"swap-arrows.svg"},
      "best-move-card":{mode:"best",title:"Best move",sub:"You get 3, give 2. Send the offer and swap in person."},
      "incoming-offer":{mode:"offer",title:"A friend sent an offer",sub:"Review the stickers, then accept or decline."},
      "accepted-confirm-handover":{mode:"handover",title:"Handover confirmed",sub:"Swap in person, then both people confirm before books update."},
      "swap-complete":{mode:"complete",title:"Swap complete",sub:"Both sides confirmed. The book is updated."},
      "group-progress":{mode:"group",title:"Group progress",sub:"Progress, spares, and best swap pairings."},
      "achievement-modal":{mode:"achievement",title:"Milestone unlocked",sub:"25% of the book"},
      "social-og-preview":{mode:"og",title:"Sticker Swap",sub:"HTML/CSS placeholder. Replace with final raster later."}
    };
    const q=new URLSearchParams(location.search);
    const name=q.get("surface")||"landing-mobile";
    const s=surfaces[name]||surfaces["landing-mobile"];
    const motif=file=>`../public/assets/motifs/${file}`;
    const stage=document.getElementById("stage");
    stage.className=`stage ${s.desktop?"desktop":""} ${s.mode==="og"?"og":""}`;
    const chromeTop=()=>`<div class="top"><div class="brand"><img src="${motif("swap-arrows.svg")}" alt="">STICKER SWAP</div><div class="pill">DEMO</div></div>`;
    const hero=()=>`${chromeTop()}<div class="content grid ${s.desktop?"cols":""}"><section class="hero"><div class="kicker">Matchday Foil Table</div><h1>${s.title}</h1><p>${s.sub}</p><div class="actions"><span class="btn">Create group</span><span class="btn secondary">Join group</span></div></section><section class="card"><img class="motif" src="${motif("pack.svg")}" alt=""><h2>Swap table</h2><p>Foil, cream paper, album slots, and friend-to-friend motion. No official marks.</p></section></div>`;
    const form=(label,button)=>`${chromeTop()}<div class="content"><section class="hero"><img class="motif" src="${motif("pack.svg")}" alt=""><div class="kicker">${label}</div><h1>${s.title}</h1><p>${s.sub}</p><div class="card" style="margin-top:18px"><div class="field">ABC123</div><div class="actions"><span class="btn">${button}</span></div></div></section></div>`;
    const collection=()=>`${chromeTop()}<div class="content"><section class="hero"><div class="kicker">Matchday album</div><h1>${s.title}</h1><p>${s.sub}</p></section><div class="card" style="margin-top:12px"><p>My album progress</p><h2>356 / 980</h2><div class="bar"><i></i></div><div class="stats"><span class="stat"><b>356</b>In book</span><span class="stat"><b>42</b>Spares</span><span class="stat"><b>624</b>Missing</span></div></div>${["Foil Specials","Swap Table","Local Pitch"].map((x,i)=>`<div class="section"><div class="row"><i class="mark"></i><b>${x}</b></div><span>${i===0?"8/8":"12/20"}</span></div>`).join("")}</div>`;
    const empty=()=>`${chromeTop()}<div class="content"><div class="empty" style="min-height:520px"><img class="motif" src="${motif(s.motif)}" alt=""><h1>${s.title}</h1><p>${s.sub}</p></div></div>`;
    const swap=(kind)=>`${chromeTop()}<div class="content"><section class="hero"><div class="kicker">${kind}</div><h1>${s.title}</h1><p>${s.sub}</p></section><div class="swap-card foil"><div><b>S09 14</b><p>Table Swap Card - Swap Table</p><span class="tag">Has spare</span></div><div><b>Ava</b><p>In group</p></div></div><div class="actions"><span class="btn">Send offer</span><span class="btn secondary">Confirm handover</span></div></div>`;
    const profile=()=>`${chromeTop()}<div class="content"><section class="hero"><img class="motif" src="${motif("sticker-edge.svg")}" alt=""><h1>${s.title}</h1><p>${s.sub}</p></section><div class="avatar-grid">${["You","Sam","Ava","Mo"].map(n=>`<div class="card avatar"><div class="paper"></div><b>${n}</b><p>0 in book</p></div>`).join("")}</div></div>`;
    const group=()=>`${chromeTop()}<div class="content"><section class="hero"><div class="kicker">Group table</div><h1>${s.title}</h1><p>${s.sub}</p></section><div class="card" style="margin-top:12px"><h2>Group swap plan</h2><p>68 books filled if everyone swaps their spares.</p><div class="bar"><i style="width:58%"></i></div></div>${["Ava 44%","Sam 38%","You 36%"].map(x=>`<div class="section"><div class="row"><i class="mark"></i><b>${x}</b></div><span>spares ready</span></div>`).join("")}</div>`;
    const achievement=()=>`${chromeTop()}<div class="content"><section class="hero"><h1>Collection tab behind modal</h1><p>Used to verify achievement overlay styling.</p></section></div><div class="modal-wrap"><div class="modal foil"><div class="kicker">Sticker moment unlocked</div><img class="motif" src="${motif("foil-shine.svg")}" alt=""><h1>${s.title}</h1><p>${s.sub}</p></div></div>`;
    const og=()=>`<div class="placeholder">placeholder, not final raster</div><div class="content"><div class="brand"><img src="${motif("swap-arrows.svg")}" alt="">STICKER SWAP</div><h1>${s.title}</h1><p>${s.sub}</p><div style="width:360px;height:8px;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--gold));margin-top:28px"></div></div>`;
    const map={icon:()=>`<div class="icon-preview"><img src="../icon-512.png" alt=""><h1>${s.title}</h1><p>Source: icon.svg plus PNG manifest set.</p></div>`,loader:()=>`<div class="loader"><div class="brand"><img src="${motif("swap-arrows.svg")}" alt="">STICKER SWAP</div><p>${s.sub}</p><div class="spinner"></div></div>`,landing:hero,invite:()=>form("Invite", "Join group"),create:()=>form("Create group", "Create new group"),join:()=>form("Join group", "Join group"),profile,collection,empty,best:()=>swap("Best move"),offer:()=>swap("Incoming offer"),handover:()=>swap("Accepted offer"),complete:()=>swap("Swap complete"),group,achievement,og};
    stage.innerHTML=(map[s.mode]||hero)();
  </script>
</body>
</html>
